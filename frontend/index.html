    <!-- Structured data — WebApplication -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "HomeIQ",
      "url": "https://homeiq.ie",
      "description": "Search every residential property sale in Ireland since 2010. Explore prices by address, Eircode, or area with interactive maps and price trend charts.",
      "applicationCategory": "FinanceApplication",
      "operatingSystem": "Web",
      "browserRequirements": "Requires JavaScript",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "EUR"
      },
      "areaServed": {
        "@type": "Country",
        "name": "Ireland",
        "sameAs": "https://www.wikidata.org/wiki/Q27"
      },
      "featureList": [
        "Radius-based property search",
        "Price trend charts by area and county",
        "Eircode lookup",
        "Mortgage calculator",
        "BER energy rating statistics"
      ],
      "inLanguage": "en-IE",
      "isAccessibleForFree": true,
      "provider": {
        "@type": "Organization",
        "name": "HomeIQ.ie",
        "url": "https://homeiq.ie"
      }
    }
    </script>

    <!-- Structured data — Dataset -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Dataset",
      "name": "Ireland Residential Property Price Register (785,000 Sales)",
      "description": "All residential property sales in Ireland 2010-2026. 85% geocoded with coordinates, covering 26 counties and 667,000+ searchable locations with interactive maps and price trends.",
      "url": "https://homeiq.ie",
      "license": "https://creativecommons.org/licenses/by/4.0/",
      "isAccessibleForFree": true,
      "creator": {
        "@type": "Organization",
        "name": "Revenue Commissioners, Ireland",
        "url": "https://www.propertypriceregister.ie"
      },
      "temporalCoverage": "2010-01-01/2026-05-22",
      "spatialCoverage": {
        "@type": "Country",
        "name": "Ireland"
      },
      "distribution": {
        "@type": "DataDownload",
        "encodingFormat": "application/json",
        "contentUrl": "https://homeiq.ie"
      },
      "variableMeasured": [
        "Sale Price",
        "Sale Date",
        "Property Type",
        "Geographic Coordinates",
        "Eircode",
        "County",
        "Address"
      ]
    }
    </script>

    <!-- Structured data — FAQ -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [{
        "@type": "Question",
        "name": "How many property sales are in the HomeIQ database?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "HomeIQ contains 785,000 residential property sales in Ireland from 2010 to 2026, with 85% geocoded for map-based search across all 26 counties."
        }
      }, {
        "@type": "Question",
        "name": "Is HomeIQ free to use?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Yes, HomeIQ is completely free. Search property prices by address, Eircode, or area with no registration required. Access price trends, mortgage calculator, and energy ratings at no cost."
        }
      }, {
        "@type": "Question",
        "name": "What time period does the data cover?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "HomeIQ covers all residential property sales in Ireland from January 2010 to May 2026, sourced from the official Property Price Register maintained by the Revenue Commissioners."
        }
      }, {
        "@type": "Question",
        "name": "Can I search by Eircode?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Yes, HomeIQ supports Eircode search. Enter any Irish Eircode to find all property sales in that area with prices, dates, and map locations."
        }
      }]
    }
    </script>
