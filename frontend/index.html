<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>HomeIQ — Ireland Property Price Search</title>
    <meta name="description" content="Search every residential property sale in Ireland since 2010. Explore prices by address, Eircode, or area with interactive maps and price trend charts." />
    <meta name="keywords" content="Ireland property prices, PPR, property price register, house prices Ireland, Dublin house prices, Irish property sales, eircode property search" />
    <link rel="canonical" href="https://homeiq.ie/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://homeiq.ie/" />
    <meta property="og:title" content="HomeIQ — Ireland Property Price Search" />
    <meta property="og:description" content="Search every residential property sale in Ireland since 2010. Explore prices by address, Eircode, or area with interactive maps and price trend charts." />
    <meta property="og:site_name" content="HomeIQ.ie" />
    <meta property="og:locale" content="en_IE" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="HomeIQ — Ireland Property Price Search" />
    <meta name="twitter:description" content="Search every residential property sale in Ireland since 2010. Free, fast, covers all 26 counties." />

    <!-- Performance hints -->
    <link rel="preconnect" href="https://unpkg.com" />
    <link rel="preconnect" href="https://a.tile.openstreetmap.org" />
    <link rel="preconnect" href="https://b.tile.openstreetmap.org" />
    <link rel="preconnect" href="https://c.tile.openstreetmap.org" />
    <link rel="dns-prefetch" href="https://eloquent-optimism-production-350a.up.railway.app" />

    <!-- Structured data — WebApplication -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "HomeIQ",
      "url": "https://homeiq.ie",
      "description": "Search every residential property sale in Ireland since 2010. Explore prices by address, Eircode, or area with interactive maps and price trend charts.",
      "applicationCategory": "FinanceApplication",
      "operatingSystem": "Web",
      "browserRequirements": "Requires JavaScript",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "EUR"
      },
      "areaServed": {
        "@type": "Country",
        "name": "Ireland",
        "sameAs": "https://www.wikidata.org/wiki/Q27"
      },
      "featureList": [
        "Radius-based property search",
        "Price trend charts by area and county",
        "Eircode lookup",
        "Mortgage calculator",
        "BER energy rating statistics"
      ],
      "inLanguage": "en-IE",
      "isAccessibleForFree": true,
      "provider": {
        "@type": "Organization",
        "name": "HomeIQ.ie",
        "url": "https://homeiq.ie"
      }
    }
    </script>

    <!-- Structured data — Dataset -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Dataset",
      "name": "Ireland Residential Property Price Register",
      "description": "All residential property sales in Ireland since 2010, geocoded and indexed for search.",
      "url": "https://homeiq.ie",
      "license": "https://creativecommons.org/licenses/by/4.0/",
      "isAccessibleForFree": true,
      "creator": {
        "@type": "Organization",
        "name": "Revenue Commissioners, Ireland",
        "url": "https://www.propertypriceregister.ie"
      },
      "temporalCoverage": "2010/..",
      "spatialCoverage": {
        "@type": "Country",
        "name": "Ireland"
      }
    }
    </script>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
