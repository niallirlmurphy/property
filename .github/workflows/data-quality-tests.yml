name: Data Quality Tests

on:
  schedule:
    # Run every day at 2 AM UTC
    - cron: '0 2 * * *'

  workflow_dispatch:  # Allow manual trigger

  push:
    branches: [main]
    paths:
      - 'db/**'
      - 'scripts/regeocode_*.py'
      - 'tests/test_data_quality.py'

jobs:
  data-quality:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install pytest psycopg2-binary python-dotenv

      - name: Run data quality tests
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          pytest tests/test_data_quality.py -v --tb=short

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: test-results
          path: pytest-report.xml

      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v6
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '🚨 Data Quality Test Failed',
              body: `Data quality tests failed on ${context.sha.slice(0, 7)}.\n\nCheck the [workflow run](${context.payload.repository.html_url}/actions/runs/${context.runId}) for details.`,
              labels: ['data-quality', 'automated']
            })
