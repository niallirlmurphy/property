[build]
builder = "nixpacks"

[deploy]
startCommand = "/opt/venv/bin/uvicorn main:app --host 0.0.0.0 --port $PORT"
healthcheckPath = "/health"
healthcheckTimeout = 90
restartPolicyType = "on_failure"
